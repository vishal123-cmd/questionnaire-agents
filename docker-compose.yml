# ============= DOCKER COMPOSE FOR KNOWLEDGEAI =============
# This sets up PostgreSQL, Backend, and Frontend

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: knowledgeai-postgres
    environment:
      POSTGRES_DB: knowledgeai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledgeai-backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/knowledgeai
      SECRET_KEY: your-secret-key-change-in-production-min-32-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    command: >
      sh -c "
        sleep 5 &&
        python init_db.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knowledgeai-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  backend_uploads:

# Usage:
# 1. Run: docker-compose up --build
# 2. Access Frontend: http://localhost:5173
# 3. Access API Docs: http://localhost:8000/docs
# 4. Stop: docker-compose down
# 5. Remove all data: docker-compose down -v
